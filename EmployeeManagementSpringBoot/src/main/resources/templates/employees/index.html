<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
    <div class="container-fluid">
        <a class="navbar-brand" href="/employees">Employee Management</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item me-2">
                    <a class="nav-link" href="/employees">Employees</a>
                </li>
                <li class="nav-item">
                    <a class="btn btn-outline-light btn-sm" href="/employees/create">Add Employee</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mb-5">
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div class="card shadow-sm">
        <div class="card-header d-flex justify-content-between align-items-center">
            <h5 class="mb-0">Employee List</h5>
            <a href="/employees/create" class="btn btn-primary btn-sm">Add Employee</a>
        </div>
        <div class="card-body">
            <div th:if="${#lists.isEmpty(employees)}" class="alert alert-info">
                No employees found. Add a new employee to get started.
            </div>
            <div th:unless="${#lists.isEmpty(employees)}" class="table-responsive">
                <table class="table table-bordered table-hover align-middle mb-0">
                    <thead class="table-light">
                    <tr>
                        <th>#</th>
                        <th>Full Name</th>
                        <th>Email</th>
                        <th>Phone</th>
                        <th>Department</th>
                        <th>Salary</th>
                        <th class="text-center">Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="employee, iterStat : ${employees}">
                        <td th:text="${iterStat.count}"></td>
                        <td th:text="${employee.fullName}"></td>
                        <td th:text="${employee.email}"></td>
                        <td th:text="${employee.phone}"></td>
                        <td th:text="${employee.department}"></td>
                        <td th:text="${employee.salary != null ? '$' + #numbers.formatDecimal(employee.salary, 1, 2) : '-'}"></td>
                        <td class="text-nowrap text-center">
                            <a th:href="@{/employees/edit/{id}(id=${employee.id})}" class="btn btn-sm btn-secondary me-1">Edit</a>
                            <a th:href="@{/employees/delete/{id}(id=${employee.id})}" class="btn btn-sm btn-danger" onclick="return confirm('Delete this employee?');">Delete</a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
