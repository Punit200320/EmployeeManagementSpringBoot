<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Employee</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
    <div class="container-fluid">
        <a class="navbar-brand" href="/employees">Employee Management</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item me-2">
                    <a class="nav-link" href="/employees">Employees</a>
                </li>
                <li class="nav-item">
                    <a class="btn btn-outline-light btn-sm" href="/employees/create">Add Employee</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mb-5">
    <div class="card shadow-sm">
        <div class="card-header">
            <h5 class="mb-0">Edit Employee</h5>
        </div>
        <div class="card-body">
            <form th:action="@{/employees/update/{id}(id=${employee.id})}" th:object="${employee}" method="POST" class="needs-validation" novalidate>
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label" for="fullName">Full Name</label>
                        <input type="text" th:field="*{fullName}" class="form-control" id="fullName">
                        <span th:if="${#fields.hasErrors('fullName')}" class="text-danger small" th:errors="*{fullName}"></span>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label" for="email">Email</label>
                        <input type="email" th:field="*{email}" class="form-control" id="email">
                        <span th:if="${#fields.hasErrors('email')}" class="text-danger small" th:errors="*{email}"></span>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label" for="phone">Phone</label>
                        <input type="text" th:field="*{phone}" class="form-control" id="phone">
                        <span th:if="${#fields.hasErrors('phone')}" class="text-danger small" th:errors="*{phone}"></span>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label" for="department">Department</label>
                        <input type="text" th:field="*{department}" class="form-control" id="department">
                        <span th:if="${#fields.hasErrors('department')}" class="text-danger small" th:errors="*{department}"></span>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label" for="salary">Salary</label>
                        <input type="number" step="0.01" th:field="*{salary}" class="form-control" id="salary">
                        <span th:if="${#fields.hasErrors('salary')}" class="text-danger small" th:errors="*{salary}"></span>
                    </div>
                </div>
                <div class="mt-4">
                    <button type="submit" class="btn btn-primary">Update Employee</button>
                    <a href="/employees" class="btn btn-secondary ms-2">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
